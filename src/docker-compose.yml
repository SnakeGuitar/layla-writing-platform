# Layla Project Infrastructure
services:
  # --- 1. SQL Server (Identity & Metadata) ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: layla-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_PASSWORD}
      - MSSQL_MEM_LIMIT=${SQL_MEM_LIMIT}
    ports:
      - "${SQL_PORT}:${SQL_PORT}"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U ${SQL_USERNAME} -P ${SQL_PASSWORD} -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- 2. MongoDB (Manuscripts & Wiki) ---
  mongodb:
    image: mongo:7
    container_name: layla-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:${MONGO_PORT}"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:${MONGO_PORT}/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- 3. Neo4j (Worldbuilding) ---
  neo4j:
    image: neo4j:5
    container_name: layla-neo4j
    ports:
      - "${NEO4J_BROWSER_PORT}:${NEO4J_BROWSER_PORT}"
      - "${NEO4J_BOLT_PORT}:${NEO4J_BOLT_PORT}"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${NEO4J_BROWSER_PORT}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- 4. Worldbuilding API (Node.js) ---
  layla-worldbuilding:
    build:
      context: ./server-worldbuilding
      dockerfile: Dockerfile
    container_name: layla-worldbuilding
    ports:
      - "${WORLDBUILDING_PORT_HTTP}:${WORLDBUILDING_PORT_HTTP}"
      - "${WORLDBUILDING_PORT_HTTPS}:${WORLDBUILDING_PORT_HTTPS}"
    environment:
      - PORT_HTTP=${WORLDBUILDING_PORT_HTTP}
      - PORT_HTTPS=${WORLDBUILDING_PORT_HTTPS}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_SECRET_REFRESH=${JWT_SECRET_REFRESH}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY}
      - ALLOWED_ORIGINS=${WORLDBUILDING_ALLOWED_ORIGINS}
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:${MONGO_PORT}/layla_worldbuilding?authSource=admin
      - NEO4J_URI=bolt://neo4j:${NEO4J_BOLT_PORT}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBIT_USER}:${RABBIT_PASSWORD}@rabbitmq:${RABBIT_PORT}
      - RABBITMQ_EXCHANGE=worldbuilding.events
      - RABBITMQ_QUEUE=worldbuilding.node.queue
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:${WORLDBUILDING_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- 5. Core API (.NET) ---
  server-core:
    build:
      context: ./server-core
      dockerfile: Layla.Api/Dockerfile
    container_name: server-core
    ports:
      - "${CORE_PORT_HTTPS}:${CORE_PORT_HTTPS}"
      - "${CORE_PORT_HTTP}:${CORE_PORT_HTTP}"
    environment:
      - Ports__HTTPS=${CORE_PORT_HTTPS}
      - Ports__HTTP=${CORE_PORT_HTTP}
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__ExpirationInMinutes=${JWT_ACCESS_TOKEN_EXPIRY}
      - DatabaseConfigs__SQL__ConnectionString=Server=${SQL_SERVER},${SQL_PORT};Database=${SQL_DATABASE};User Id=${SQL_USERNAME};Password=${SQL_PASSWORD};TrustServerCertificate=True;
      - DatabaseConfigs__SQL__CommandTimeoutSeconds=30
      - DatabaseConfigs__SQL__MaxRetryCount=5
      - DatabaseConfigs__SQL__MaxRetryDelay=00:00:10
      - DatabaseConfigs__SQL__ErrorNumbersToAdd=null
      - RabbitMQ__HostName=${RABBIT_HostName}
      - RabbitMQ__Port=${RABBIT_PORT}
      - RabbitMQ__UserName=${RABBIT_USER}
      - RabbitMQ__Password=${RABBIT_PASSWORD}
      - RabbitMQ__VirtualHost=/
      - RabbitMQ__Exchange=worldbuilding.events
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_RUNNING_IN_CONTAINER=true
      - DOTNET_SKIP_FIRST_TIME_EXPERIENCE=true
      - ASPNETCORE_ENVIRONMENT=${CORE_ENVIRONMENT}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/app/certs/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=YourStrongPasswordAF
      - ASPNETCORE_URLS=https://+:${CORE_PORT_HTTPS};http://+:${CORE_PORT_HTTP}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CORE_PORT_HTTP}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- 6. RabbitMQ (Message Queue) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: layla-rabbit
    ports:
      - "${RABBIT_PORT}:${RABBIT_PORT}"
      - "${RABBIT_MANAGEMENT_PORT}:${RABBIT_MANAGEMENT_PORT}"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBIT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBIT_PASSWORD}
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- 7. Web app - (.NET) ---
  layla-web:
    build:
      context: ./client-web
      dockerfile: Dockerfile
    container_name: layla-web
    ports:
      - "${WEB_PORT_HTTPS}:${WEB_PORT_HTTPS}"
      - "${WEB_PORT_HTTP}:${WEB_PORT_HTTP}"
    environment:
      - Ports__HTTPS=${WEB_PORT_HTTPS}
      - Ports__HTTP=${WEB_PORT_HTTP}
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_RUNNING_IN_CONTAINER=true
      - DOTNET_SKIP_FIRST_TIME_EXPERIENCE=true
      - ASPNETCORE_ENVIRONMENT=${CORE_ENVIRONMENT}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/src/certs/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=YourStrongPasswordAF
      - ASPNETCORE_URLS=https://+:${WEB_PORT_HTTPS};http://+:${WEB_PORT_HTTP}
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:${WEB_PORT_HTTP}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- 8. API Gateway (YARP) ---
  layla-api-gateway:
    build:
      context: ./infraestructure-api_gateway
      dockerfile: Dockerfile
    container_name: layla-api-gateway
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - Ports__HTTP=5000
      - Ports__HTTPS=5001
    depends_on:
      server-core:
        condition: service_started
      layla-worldbuilding:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sql_data:
  mongo_data:
  neo4j_data:
  rabbit_data: