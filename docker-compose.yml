# Layla Project Infrastructure
services:
  # --- 1. SQL Server (Identity & Metadata) ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: layla-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_PASSWORD}
      - MSSQL_MEM_LIMIT=${MSSQL_MEM_LIMIT}
    ports:
      - "${SQL_PORT}:${SQL_PORT}"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U ${SQL_USERNAME} -P ${SQL_PASSWORD} -Q 'SELECT 1' -C
      interval: 10s
      retries: 5
      timeout: 3s
    restart: unless-stopped

  # --- 2. MongoDB (Manuscripts & Wiki) ---
  mongodb:
    image: mongo:7
    container_name: layla-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:${MONGO_PORT}"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:${MONGO_PORT}/test --quiet
      interval: 10s
      retries: 5
    restart: unless-stopped

  # --- 3. Neo4j (Worldbuilding) ---
  neo4j:
    image: neo4j:5
    container_name: layla-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "${NEO4J_BROWSER_PORT}:${NEO4J_BROWSER_PORT}"
      - "${NEO4J_BOLT_PORT}:${NEO4J_BOLT_PORT}"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:${NEO4J_BROWSER_PORT} || exit 1
      interval: 10s
      retries: 5
    restart: unless-stopped

  # --- 4. Worldbuilding API (Node.js) ---
  layla-worldbuilding:
    build:
      context: ./src/server-worldbuilding/
      dockerfile: Dockerfile
    container_name: layla-worldbuilding
    ports:
      - "${WORLDBUILDING_PORT}:${WORLDBUILDING_PORT}"
    environment:
      - PORT=${WORLDBUILDING_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_SECRET_REFRESH=${JWT_SECRET_REFRESH}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY}
      - ALLOWED_ORIGINS=${WORLDBUILDING_ALLOWED_ORIGINS}
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:${MONGO_PORT}/layla_worldbuilding?authSource=admin
      - NEO4J_URI=bolt://neo4j:${NEO4J_BOLT_PORT}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBIT_USER}:${RABBIT_PASSWORD}@rabbitmq:${RABBIT_PORT}
      - RABBITMQ_EXCHANGE=worldbuilding.events
      - RABBITMQ_QUEUE=worldbuilding.node.queue
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- 5. Core API (.NET) ---
  server-core:
    build:
      context: ./src/server-core
      dockerfile: Layla.Api/Dockerfile
    container_name: layla-core
    ports:
      - "${CORE_PORT_1}:${CORE_PORT_1}"
      - "${CORE_PORT_2}:${CORE_PORT_2}"
    environment:
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__ExpirationInMinutes=${JWT_ACCESS_TOKEN_EXPIRY}
      - ASPNETCORE_ENVIRONMENT=${CORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=Server=sqlserver:${SQL_PORT};Database=${SQL_DATABASE};User Id=${SQL_USERNAME};Password=${SQL_PASSWORD};TrustServerCertificate=True;
      - RabbitMQ__HostName=${RABBIT_HostName}
      - RabbitMQ__Port=${RABBIT_PORT}
      - RabbitMQ__UserName=${RABBIT_USER}
      - RabbitMQ__Password=${RABBIT_PASSWORD}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- 6. RabbitMQ (Message Queue) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: layla-rabbit
    ports:
      - "${RABBIT_PORT}:${RABBIT_PORT}"
      - "${RABBIT_MANAGEMENT_PORT}:${RABBIT_MANAGEMENT_PORT}"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBIT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBIT_PASSWORD}
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      retries: 5
    restart: unless-stopped

volumes:
  sql_data:
  mongo_data:
  neo4j_data:
  rabbit_data: