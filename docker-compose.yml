# Layla Project Infrastructure
services:
  # --- 1. SQL Server (Identity & Metadata) ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: layla-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_PASSWORD}
      - MSSQL_MEM_LIMIT=1GB
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SQL_PASSWORD} -Q 'SELECT 1' -C
      interval: 10s
      retries: 5
      timeout: 3s
    restart: unless-stopped

  # --- 2. MongoDB (Manuscripts & Wiki) ---
  mongodb:
    image: mongo:7
    container_name: layla-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      retries: 5
    restart: unless-stopped

  # --- 3. Neo4j (Worldbuilding) ---
  neo4j:
    image: neo4j:5
    container_name: layla-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1
      interval: 10s
      retries: 5
    restart: unless-stopped

  # --- 4. Worldbuilding API (Node.js) ---
  layla-worldbuilding:
    build:
      context: ./src/server-worldbuilding/
      dockerfile: Dockerfile
    container_name: layla-worldbuilding
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_SECRET_REFRESH=${JWT_SECRET_REFRESH}
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/layla_worldbuilding?authSource=admin
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBIT_USER}:${RABBIT_PASSWORD}@rabbitmq:5672
      - RABBITMQ_EXCHANGE=worldbuilding.events
      - RABBITMQ_QUEUE=worldbuilding.node.queue
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- 5. Core API (.NET) ---
  server-core:
    build:
      context: ./src/server-core
      dockerfile: Layla.Api/Dockerfile
    container_name: layla-core
    ports:
      - "7165:7165"
      - "5287:5287"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=LaylaDb;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True;
      - JwtSettings__Secret=${JWT_SECRET}
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=${RABBIT_USER}
      - RabbitMQ__Password=${RABBIT_PASSWORD}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- 6. RabbitMQ (Message Queue) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: layla-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBIT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBIT_PASSWORD}
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      retries: 5
    restart: unless-stopped

volumes:
  sql_data:
  mongo_data:
  neo4j_data:
  rabbit_data: